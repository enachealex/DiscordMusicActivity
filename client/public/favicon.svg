<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="labelShine" cx="38%" cy="33%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
  <!-- Vinyl disc -->
  <circle cx="50" cy="50" r="48" fill="#18191c"/>
  <!-- Groove rings -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#2a2b2f" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#2a2b2f" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="36" fill="none" stroke="#2a2b2f" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#2a2b2f" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="#2a2b2f" stroke-width="1.2"/>
  <!-- Center label -->
  <circle cx="50" cy="50" r="22" fill="#5865f2"/>
  <circle cx="50" cy="50" r="22" fill="url(#labelShine)"/>
  <!-- Music note on label -->
  <text x="50" y="57" text-anchor="middle" font-size="20" fill="white" font-family="sans-serif" opacity="0.95">♪</text>
  <!-- Center hole -->
  <circle cx="50" cy="50" r="3.5" fill="#18191c"/>
</svg>
